kind = "web"
previewPath = "/"
title = "Pita Pit 2"
version = "1.0.0"
id = "artifacts/pita-pit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18876

[services.development]
run = "pnpm --filter @workspace/pita-pit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pita-pit", "run", "build" ]
publicDir = "artifacts/pita-pit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18876"
BASE_PATH = "/"
