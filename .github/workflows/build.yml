name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (pita-pit)
        run: pnpm --filter @workspace/pita-pit run build

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: pita-pit/dist/
          retention-days: 7

      - name: Upload API dist
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: api-server/dist/
          retention-days: 7
